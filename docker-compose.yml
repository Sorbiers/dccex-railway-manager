services:
  app:
    build: .
    image: dccex-railway-manager
    container_name: dccex-railway-manager
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Kiosk display backlight control (power saving). Override per device.
      - BACKLIGHT_PATH=/sys/class/backlight/10-0045/brightness
      - BACKLIGHT_MAX=255
    volumes:
      # Persist devices / schedules / settings across restarts and rebuilds
      - dccex-data:/app/dist/data
      # Let the app blank/restore the DSI backlight for idle power saving.
      # The container runs as root, so it can write this bind-mounted sysfs file.
      # On a device without this panel, comment this out (or adjust the path).
      - /sys/class/backlight/10-0045/brightness:/sys/class/backlight/10-0045/brightness
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    # If your DCC-EX command station is only reachable on the host LAN and the
    # default bridge network can't reach it, uncomment host networking (Linux
    # only) and remove the `ports:` mapping above:
    # network_mode: host

volumes:
  dccex-data:
